name: portwhine

services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: portwhine
      POSTGRES_USER: portwhine
      POSTGRES_PASSWORD: portwhine
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portwhine -d portwhine"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - portwhine

  operator:
    build:
      context: ../backend
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "50051:50051"
    environment:
      PW_SERVER_GRPC_ADDR: ":50051"
      PW_SERVER_OPERATOR_ADDRESS: "portwhine-operator:50051"
      PW_RUNTIME_TYPE: docker
      PW_RUNTIME_DOCKER_NETWORK: portwhine_portwhine
      PW_DATABASE_HOST: portwhine-db
      PW_DATABASE_PORT: "5432"
      PW_DATABASE_NAME: portwhine
      PW_DATABASE_USER: portwhine
      PW_DATABASE_PASSWORD: portwhine
      PW_DATABASE_SSLMODE: disable
      PW_AUTH_JWT_SECRET: dev-secret-change-in-production
      PW_LOG_LEVEL: debug
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - portwhine

volumes:
  pgdata:

networks:
  portwhine:
    driver: bridge
