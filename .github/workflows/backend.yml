name: Backend

on:
  push:
    branches: [main]
    paths: ["backend/**"]
  pull_request:
    branches: [main]
    paths: ["backend/**"]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/**/go.sum

      - name: Run tests
        working-directory: backend
        run: |
          echo "Testing root module..."
          go test -race -count=1 ./...
          shopt -s nullglob
          for dir in workers/*/ triggers/*/; do
            echo "Testing $dir..."
            (cd "$dir" && go test -race -count=1 ./...)
          done

      - name: Build operator
        working-directory: backend
        run: go build ./...

      - name: Build workers & triggers
        working-directory: backend
        run: |
          shopt -s nullglob
          for dir in workers/*/; do
            echo "Building $dir..."
            (cd "$dir" && go build .)
          done
          for dir in triggers/*/; do
            echo "Building $dir..."
            (cd "$dir" && go build .)
          done

      - name: Vet
        working-directory: backend
        run: |
          echo "Vetting root module..."
          go vet ./...
          shopt -s nullglob
          for dir in workers/*/ triggers/*/; do
            echo "Vetting $dir..."
            (cd "$dir" && go vet ./...)
          done
